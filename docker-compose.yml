version: '3.8'

services:
  yolo-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/models/best.pt
      - PYTHONUNBUFFERED=1
    volumes:
      - ./models:/app/models:ro  # Mount model directory
      - ./logs:/app/logs         # Mount logs directory
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s